version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cocms-postgres
    restart: unless-stopped
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: cocms
      POSTGRES_PASSWORD: cocms_password
      POSTGRES_DB: cocms_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cocms-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: cocms-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cocms.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - cocms-network
    depends_on:
      - postgres

volumes:
  pgdata:
  pgadmin-data:

networks:
  cocms-network:
    driver: bridge

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cocms-postgres
    restart: unless-stopped
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: cocms
      POSTGRES_PASSWORD: cocms_password
      POSTGRES_DB: cocms_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
